{% block content %}

{% block extra_head %}
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
{% endblock %}

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh;
  }

  .page-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 48px;
    background: #ffffffd7;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .logo { font-size: 26px; font-weight: 700; color: #1a1a1a; letter-spacing: 0.5px; text-decoration: none; }
  .logo span { color: #d4845a; }
  .btn-nav {
    padding: 10px 26px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-block;
  }
  .btn-signin { background: transparent; color: #d4845a; border: 1.5px solid #d4845a; }
  .btn-signin:hover { background: rgba(212,132,90,0.08); }

  .register-wrapper {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 104px 24px 48px;
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.38), rgba(0,0,0,0.28)),
      url('https://images.unsplash.com/photo-1519869325930-281384150729?w=1800&auto=format&fit=crop&q=90')
      center / cover no-repeat fixed;
  }
  .register-box {
    width: 100%;
    max-width: 660px;
    background: #ffffff;
    border-radius: 24px;
    padding: 52px 56px;
    box-shadow: 0 24px 72px rgba(0,0,0,0.22);
    animation: popIn 0.5s cubic-bezier(.26,.86,.44,.985) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .register-box h2 {
    font-size: 34px;
    font-weight: 700;
    color: #1a1a1a;
    text-align: center;
    margin-bottom: 32px;
  }

  .alert-danger {
    background: #fff0ee;
    color: #c0392b;
    border: 1px solid #f5c6c2;
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 14px;
    margin-bottom: 24px;
    text-align: center;
  }

  
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 0; }
  .form-group.full { grid-column: 1 / -1; }

  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #444;
    margin-bottom: 9px;
  }

  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 15px 18px;
    border: 1.5px solid #e0d8d2;
    border-radius: 12px;
    font-size: 15px;
    color: #1a1a1a;
    background: #fdfaf8;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    font-family: inherit;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    border-color: #d4845a;
    box-shadow: 0 0 0 3px rgba(212,132,90,0.14);
    background: #fff;
  }
  .form-group textarea { resize: vertical; min-height: 88px; }
  .form-group input[type="file"] {
    padding: 12px 16px;
    font-size: 14px;
    background: #fff;
    cursor: pointer;
  }

  .error-message { color: #c0392b; font-size: 12px; margin-top: 5px; line-height: 1.4; }

  .btn-register {
    width: 100%;
    padding: 17px;
    background: #d4845a;
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 0.3px;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(212,132,90,0.4);
    -webkit-appearance: none;
    touch-action: manipulation;
  }
  .btn-register:hover {
    background: #bf6e44;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(212,132,90,0.5);
  }

  .divider { border: none; border-top: 1px solid #f0e8e0; margin: 28px 0; }

  .register-footer { text-align: center; font-size: 15px; color: #555; }
  .register-footer a { color: #d4845a; font-weight: 600; text-decoration: none; }
  .register-footer a:hover { text-decoration: underline; }

  
  .page-footer {
    background: #fff;
    border-top: 1px solid #f0e8e0;
    text-align: center;
    padding: 18px 48px;
    font-size: 13px;
    color: #aaa;
  }
  .page-footer a { color: #d4845a; text-decoration: none; }

  
  @media (max-width: 700px) {
    
    .form-row { grid-template-columns: 1fr; gap: 16px; }
    .form-group.full { grid-column: auto; }
    .register-box { padding: 40px 32px; }
  }

  @media (max-width: 600px) {
    .page-header { padding: 14px 20px; }
    .logo { font-size: 22px; }
    .btn-nav { padding: 9px 20px; font-size: 13px; }

    .register-wrapper {
      padding: 88px 16px 32px;
      background-attachment: scroll;
    }

    .register-box {
      padding: 32px 22px;
      border-radius: 20px;
    }
    .register-box h2 { font-size: 27px; margin-bottom: 24px; }

    .form-group label { font-size: 13px; }
    .form-group input,
    .form-group textarea { font-size: 16px; padding: 14px 15px; border-radius: 10px; }
    .form-group input[type="file"] { font-size: 14px; }
    .form-group textarea { min-height: 76px; }

    .btn-register { font-size: 16px; padding: 16px; }
    .divider { margin: 22px 0; }
    .register-footer { font-size: 14px; }
  }

  @media (max-width: 400px) {
    .register-box { padding: 26px 16px; border-radius: 16px; }
    .register-box h2 { font-size: 23px; }
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const form = document.querySelector('form');
  const usernameError = document.getElementById('username-error');
  const emailError = document.getElementById('email-error');
  const phoneError = document.getElementById('phone-error');
  const passwordError = document.getElementById('password-error');
  const confirmError = document.getElementById('confirm-error');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    [usernameError, emailError, phoneError, passwordError, confirmError].forEach(el => el.innerText = '');

    const username = form.username.value.trim();
    const email = form.email.value.trim();
    const phone = form.phone.value.trim();
    const password = form.password.value;
    const confirm = form.confirm.value;
    let hasError = false;

    if (!/^[a-zA-Z0-9._%+-]+@gmail\.com$/.test(email)) { emailError.innerText = 'Email must be a valid Gmail address.'; hasError = true; }
    if (!/^\d{10}$/.test(phone)) { phoneError.innerText = 'Phone number must be 10 digits.'; hasError = true; }
    if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/.test(password)) { passwordError.innerText = 'Password must have 8+ chars with uppercase, lowercase, number & special character.'; hasError = true; }
    if (password !== confirm) { confirmError.innerText = 'Passwords do not match.'; hasError = true; }
    if (hasError) return;

    const csrfToken = '{{ csrf_token }}';
try {
  const response = await fetch("{% url 'check_user_exists' %}", {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
    body: JSON.stringify({ username, email, phone })   
  });
  const data = await response.json();

  if (data.username_exists) { usernameError.innerText = 'Username already exists.'; hasError = true; }
  if (data.email_exists)    { emailError.innerText = 'Email already exists.'; hasError = true; }
  if (data.phone_exists)    { document.getElementById('phone-exists-error').innerText = 'Phone number already exist.'; hasError = true; }  // ← new

  if (hasError) return;
  form.submit();
} catch (err) {
  console.error(err);
  alert('Error validating form. Please try again.');
}
  });
});
</script>

<header class="page-header">
  <a href="/" class="logo">Sweet<span>Crave</span></a>
  <nav>
    <a href="/login" class="btn-nav btn-signin">Sign In</a>
  </nav>
</header>

<div class="register-wrapper">
  <div class="register-box">
    <h2>Create Account</h2>
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      {% if error %}
      <div class="alert-danger">{{ error }}</div>
      {% endif %}

      <div class="form-row">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Choose username" autocomplete="username" required>
          <div class="error-message" id="username-error"></div>
        </div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="Your full name" autocomplete="name" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="your@gmail.com" autocomplete="email" required>
          <div class="error-message" id="email-error"></div>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" name="phone" placeholder="10-digit number" autocomplete="tel" required>
          <div class="error-message" id="phone-error"></div>
          <div class="error-message" id="phone-exists-error"></div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full">
          <label>Address</label>
          <textarea name="address" placeholder="Your delivery address" autocomplete="street-address" required></textarea>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full">
          <label>Profile Picture</label>
          <input type="file" name="profile_pic" accept="image/*" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Create password" autocomplete="new-password" required>
          <div class="error-message" id="password-error"></div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm" placeholder="Confirm password" autocomplete="new-password" required>
          <div class="error-message" id="confirm-error"></div>
        </div>
      </div>

      <button type="submit" class="btn-register">Create Account</button>
    </form>

    <hr class="divider">
    <p class="register-footer">
      Already have an account? <a href="/login/">Sign in</a>
    </p>
  </div>
</div>

<footer class="page-footer">
  <p>© 2026 SweetCrave | All Rights Reserved</p>
</footer>

{% endblock %}
