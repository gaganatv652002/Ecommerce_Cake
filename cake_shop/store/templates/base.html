<!DOCTYPE html>
<html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CakeShop</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f3f3f3}
.navbar{background:#131921}
.navbar a{color:white!important}
.hero{
height:80vh;
background:url('/static/images/bg.jpg') center/cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:42px;
font-weight:bold;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
<div class="container">

<a class="navbar-brand">CakeShop</a>

<ul class="navbar-nav ms-auto">

{% if request.session.uid %}

<li class="nav-item dropdown">
<a class="nav-link dropdown-toggle"
data-bs-toggle="dropdown">Items</a>

<ul class="dropdown-menu">
{% for i in items %}
<li>
<a class="dropdown-item"
href="/user_dashboard/?flavour={{i.flavour}}">
{{i.flavour}}
</a>
</li>
{% endfor %}
</ul>
</li>

<li><a class="nav-link" href="/cart/">Cart</a></li>
<li><a class="nav-link" href="/logout/">Logout</a></li>

{% else %}
<li><a class="nav-link" href="/login/">Sign In</a></li>
<li><a class="nav-link" href="/register/">Sign Up</a></li>
{% endif %}

</ul>
</div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
