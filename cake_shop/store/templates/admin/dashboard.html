{% extends 'admin/admin_base.html' %}
{% block nav_dashboard %}active{% endblock %}
{% block content %}

<style>
  .page-heading { margin-bottom: 28px; }
  .page-heading h1 {
    font-family: Arial, sans-serif;
    font-size: 32px; color: #1a1a1a; font-weight: 400;
  }
  .page-heading p { color: #888; font-size: 14px; margin-top: 4px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 36px;
  }
  .stat-card {
    background: #fff;
    border-radius: 16px;
    padding: 24px 20px;
    border: 1px solid #ede4dc;
    box-shadow: 0 2px 12px rgba(61,43,31,0.06);
    display: flex; flex-direction: column; gap: 12px;
    transition: box-shadow 0.2s, transform 0.2s;
    cursor: default;
  }
  .stat-card:hover { box-shadow: 0 8px 28px rgba(61,43,31,0.1); transform: translateY(-2px); }
  .stat-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .stat-icon.orange { background: #fde8d8; }
  .stat-icon.blue   { background: #dceeff; }
  .stat-icon.green  { background: #d8f5e0; }
  .stat-icon.purple { background: #ecdff5; }
  .stat-label { font-size: 13px; color: #888; font-weight: 500; }
  .stat-value { font-size: 34px; font-weight: 700; color: #1a1a1a; line-height: 1; }

  .section-title {
    font-size: 18px; font-weight: 700; color: #1a1a1a;
    margin-bottom: 16px;
  }

  .table-card {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #ede4dc;
    box-shadow: 0 2px 12px rgba(61,43,31,0.06);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .table-card-header {
    padding: 16px 20px;
    border-bottom: 1px solid #ede4dc;
    display: flex; align-items: center; justify-content: space-between;
  }
  .table-card-header h2 { font-size: 15px; font-weight: 700; }
  .table-card-header a {
    font-size: 13px; color: #d4845a; font-weight: 600;
    text-decoration: none; transition: opacity 0.2s;
  }
  .table-card-header a:hover { opacity: 0.75; }

  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    padding: 10px 16px;
    text-align: left; font-size: 12px;
    font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: #aaa;
    background: #fdfaf8;
    border-bottom: 1px solid #ede4dc;
  }
  .data-table td {
    padding: 13px 16px;
    font-size: 14px; color: #333;
    border-bottom: 1px solid #f4ede8;
    vertical-align: middle;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: #fffaf7; }

  .prod-img { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; }
  .badge {
    display: inline-block;
    padding: 4px 10px; border-radius: 50px;
    font-size: 11px; font-weight: 700;
  }
  .badge-orange { background: #fde8d8; color: #bf6e44; }
  .badge-green  { background: #d8f5e0; color: #276c40; }

  .btn-sm {
    padding: 6px 14px; border-radius: 50px;
    border: none; cursor: pointer; font-size: 12px; font-weight: 600;
    text-decoration: none; display: inline-block; transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-edit { background: #fde8d8; color: #bf6e44; }
  .btn-edit:hover { background: #f9d4ba; }
  .btn-delete { background: #fde8e8; color: #b23b3b; }
  .btn-delete:hover { background: #fbc8c8; }

  .quick-actions {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }
  .action-card {
    background: #fff;
    border: 1px solid #ede4dc;
    border-radius: 14px;
    padding: 18px 16px;
    text-decoration: none;
    display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(61,43,31,0.05);
  }
  .action-card:hover { box-shadow: 0 6px 20px rgba(61,43,31,0.1); transform: translateY(-2px); border-color: #d4845a; }
  .action-card .ac-icon { font-size: 22px; }
  .action-card .ac-label { font-size: 13px; font-weight: 600; color: #1a1a1a; }
  .action-card .ac-sub { font-size: 11px; color: #999; }

  .table-wrap { overflow-x: auto; }

  @media (max-width: 600px) {
    .page-heading h1 { font-size: 24px; }
    .stat-value { font-size: 26px; }
  }
</style>

<div class="page-heading">
  <h1>SweetCrave Admin </h1>
  
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-label">Total Cakes</div>
    <div class="stat-value">{{ products|length }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Users</div>
    <div class="stat-value">{{ users_count|default:0 }}</div>
  </div>
  
</div>


{% endblock %}
