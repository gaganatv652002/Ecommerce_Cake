{% extends 'admin/admin_base.html' %}
{% block content %}

<style>
  .cp-wrapper {
    min-height: 75vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .field-msg {
    font-size: 12.5px;
    font-weight: 500;
    margin-top: 5px;
    display: none;
    color: #dc3545;
  }
  .field-msg.show { display: block; }
  .form-control.is-error { border-color: #dc3545; }
</style>

<div class="cp-wrapper">

  <h3 class="mb-4" style="width:100%;max-width:500px">Change Password</h3>

  <div class="card shadow p-4" style="max-width:500px;width:100%">

    {% for message in messages %}
      <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %} py-2">
        {{ message }}
      </div>
    {% endfor %}

    <form method="POST" id="cpForm" novalidate>
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Current Password</label>
        <input type="password" name="current_password" id="currentPwd" class="form-control">
        <div id="currentMsg" class="field-msg"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password" name="new_password" id="newPwd" class="form-control">
        <div id="newMsg" class="field-msg"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" id="confirmPwd" class="form-control">
        <div id="confirmMsg" class="field-msg"></div>
      </div>

      <button type="submit" class="btn btn-dark">Update Password</button>
      <a href="/admin_dashboard/" class="btn btn-secondary">Cancel</a>

    </form>

  </div>

</div>

<script>
  let submitted = false;

  function getMissingRules(val) {
    const missing = [];
    if (val.length < 8)          missing.push('at least 8 characters');
    if (!/[A-Z]/.test(val))      missing.push('uppercase letter');
    if (!/[a-z]/.test(val))      missing.push('lowercase letter');
    if (!/[0-9]/.test(val))      missing.push('number');
    if (!/[!@#$%^&*]/.test(val)) missing.push('special character (!@#$%^&*)');
    return missing;
  }

  document.getElementById('currentPwd').addEventListener('input', function () {
    if (!submitted) return;
    if (this.value.trim()) clearErr('currentMsg', 'currentPwd');
    else showErr('currentMsg', 'currentPwd', 'Current password is required.');
  });

  document.getElementById('newPwd').addEventListener('input', function () {
    if (!submitted) return;
    const val = this.value;
    const missing = getMissingRules(val);
    if (!val) showErr('newMsg', 'newPwd', 'New password is required.');
    else if (missing.length) showErr('newMsg', 'newPwd', 'Password must include: ' + missing.join(', ') + '.');
    else clearErr('newMsg', 'newPwd');
    const confirm = document.getElementById('confirmPwd').value;
    if (confirm) {
      if (confirm === val) clearErr('confirmMsg', 'confirmPwd');
      else showErr('confirmMsg', 'confirmPwd', 'Passwords do not match.');
    }
  });

  document.getElementById('confirmPwd').addEventListener('input', function () {
    if (!submitted) return;
    const val = this.value;
    const newVal = document.getElementById('newPwd').value;
    if (!val) showErr('confirmMsg', 'confirmPwd', 'Please confirm your new password.');
    else if (val !== newVal) showErr('confirmMsg', 'confirmPwd', 'Passwords do not match.');
    else clearErr('confirmMsg', 'confirmPwd');
  });

  document.getElementById('cpForm').addEventListener('submit', function (e) {
    submitted = true;

    ['currentMsg', 'newMsg', 'confirmMsg'].forEach(id => {
      document.getElementById(id).textContent = '';
      document.getElementById(id).classList.remove('show');
    });
    ['currentPwd', 'newPwd', 'confirmPwd'].forEach(id => {
      document.getElementById(id).classList.remove('is-error');
    });

    const current = document.getElementById('currentPwd').value.trim();
    const newVal  = document.getElementById('newPwd').value;
    const confirm = document.getElementById('confirmPwd').value;
    let valid = true;

    if (!current) { showErr('currentMsg', 'currentPwd', 'Current password is required.'); valid = false; }

    if (!newVal) { showErr('newMsg', 'newPwd', 'New password is required.'); valid = false; }
    else {
      const missing = getMissingRules(newVal);
      if (missing.length) { showErr('newMsg', 'newPwd', 'Password must include: ' + missing.join(', ') + '.'); valid = false; }
    }

    if (!confirm) { showErr('confirmMsg', 'confirmPwd', 'Please confirm your new password.'); valid = false; }
    else if (newVal !== confirm) { showErr('confirmMsg', 'confirmPwd', 'Passwords do not match.'); valid = false; }

    if (!valid) e.preventDefault();
  });

  function showErr(msgId, inputId, text) {
    const msg = document.getElementById(msgId);
    msg.textContent = text;
    msg.classList.add('show');
    document.getElementById(inputId).classList.add('is-error');
  }

  function clearErr(msgId, inputId) {
    const msg = document.getElementById(msgId);
    msg.textContent = '';
    msg.classList.remove('show');
    document.getElementById(inputId).classList.remove('is-error');
  }
</script>

{% endblock %}
