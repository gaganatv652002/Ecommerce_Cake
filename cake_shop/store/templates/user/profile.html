{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">

<div class="row">

<div class="col-md-4 mb-4">

<div class="card shadow profile-card text-center p-4">

<img src="{{user.profile_pic.url}}" class="profile-img">

<h4 class="mt-3">{{user.name}}</h4>
<p class="text-muted">{{user.email}}</p>

</div>
</div>
<div class="col-md-8">

<div class="card shadow p-4">

<h3 class="mb-4">Edit Profile</h3>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">
<label>Name</label>
<input type="text" name="name"
class="form-control"
value="{{user.name}}" required>
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" name="email"
class="form-control"
value="{{user.email}}" required>
</div>

</div>


<div class="row">

<div class="col-md-6 mb-3">
<label>Phone</label>
<input type="text" name="phone"
class="form-control"
value="{{user.phone}}" required>
</div>

<div class="col-md-6 mb-3">
<label>Profile Picture</label>
<input type="file" name="pic"
class="form-control">
</div>

</div>


<div class="mb-3">
<label>Address</label>
<textarea name="address"
class="form-control"
rows="3">{{user.address}}</textarea>
</div>


<hr>

<h5>Change Password</h5>

<div class="row">

<div class="col-md-6 mb-3">
<label>New Password</label>
<input type="password"
name="password"
class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Confirm Password</label>
<input type="password"
name="confirm"
class="form-control">
</div>

</div>


<button class="btn btn-dark w-100 mt-3">
Update Profile
</button>

</form>

</div>
</div>

</div>
</div>


<style>

.profile-card{
border-radius:12px;
background:white;
}

.profile-img{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:4px solid #eee;
}

.card{
border:none;
border-radius:12px;
}

label{
font-weight:600;
}

@media(max-width:768px){
.profile-img{
width:120px;
height:120px;
}
}

</style>

{% endblock %}
