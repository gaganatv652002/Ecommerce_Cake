
{% block content %}

<script>
  (function() {
    if (!document.querySelector('meta[name="viewport"]')) {
      var m = document.createElement('meta');
      m.name = 'viewport';
      m.content = 'width=device-width, initial-scale=1.0';
      document.head.appendChild(m);
    }
  })();
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #fffaf7;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .cp-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 40px;
    background: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    border-bottom: 1px solid #f0e8e0;
  }

  .cp-logo {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    text-decoration: none;
    letter-spacing: 0.4px;
  }
  .cp-logo span { color: #d4845a; }

  .btn-dashboard {
    background: #d4845a;
    color: #fff;
    border: none;
    padding: 9px 22px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    font-family: inherit;
    transition: background 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .btn-dashboard:hover { background: #bf6e44; transform: translateY(-1px); }

  .cp-main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 100px 20px 40px;
  }

  .cp-card {
    max-width: 480px;
    width: 100%;
    background: #fff;
    border-radius: 18px;
    padding: 36px 36px 28px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    border: 1px solid #f0e8e0;
  }

  .cp-title {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid #f0e8e0;
  }

  .form-group { margin-bottom: 18px; }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 7px;
  }

  .form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e4dbd4;
    border-radius: 10px;
    font-size: 16px; 
    color: #1a1a1a;
    background: #fffcfa;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  .form-group input:focus {
    border-color: #d4845a;
    box-shadow: 0 0 0 3px rgba(212,132,90,0.1);
    background: #fff;
  }
  .form-group input.is-error { border-color: #e05c5c; }

  .field-msg {
    font-size: 12px;
    font-weight: 500;
    margin-top: 6px;
    line-height: 1.5;
    display: none;
  }
  .field-msg.show { display: block; color: #e05c5c; }

  .form-actions { display: flex; gap: 10px; margin-top: 26px; }

  .btn {
    flex: 1;
    padding: 13px;
    border-radius: 50px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    font-family: inherit;
    transition: background 0.2s, transform 0.15s;
    touch-action: manipulation;
  }
  .btn-change { background: #d4845a; color: #fff; }
  .btn-change:hover { background: #bf6e44; transform: translateY(-1px); }
  .btn-cancel { background: #f5f0ec; color: #555; border: 1.5px solid #e4dbd4; }
  .btn-cancel:hover { background: #ede6e0; }

  .dj-msg {
    padding: 10px 14px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 18px;
  }
  .dj-msg.err { background: #fff0f0; border: 1px solid #f5c0c0; color: #c0392b; }
  .dj-msg.ok  { background: #f0fff8; border: 1px solid #b0e8d0; color: #1e7a50; }

  .cp-footer {
    background: #fff;
    border-top: 1px solid #f0e8e0;
    text-align: center;
    padding: 16px;
    font-size: 13px;
    color: #999;
  }
  .cp-footer a { color: #d4845a; text-decoration: none; }

  @media (max-width: 540px) {
    .cp-header { padding: 12px 18px; }
    .cp-logo { font-size: 19px; }
    .btn-dashboard { padding: 8px 16px; font-size: 12px; }

    .cp-main { padding: 84px 14px 32px; }

    .cp-card { padding: 24px 20px 20px; border-radius: 14px; }
    .cp-title { font-size: 19px; margin-bottom: 20px; padding-bottom: 14px; }

    .form-group { margin-bottom: 16px; }
    .form-group label { font-size: 13px; }
    .form-group input { padding: 12px 13px; }

    .form-actions { flex-direction: column; gap: 10px; margin-top: 22px; }
    .btn { padding: 13px; font-size: 15px; }
  }

  @media (max-width: 360px) {
    .cp-card { padding: 20px 14px 16px; }
    .cp-logo { font-size: 17px; }
  }
</style>

<header class="cp-header">
  <a href="/" class="cp-logo">Sweet<span>Crave</span></a>
  <a href="{% url 'user_dashboard' %}" class="btn-dashboard">← Dashboard</a>
</header>

<div class="cp-main">
  <div class="cp-card">

    <div class="cp-title">Change Password</div>

    {% for message in messages %}
      <div class="dj-msg {% if message.tags == 'error' %}err{% else %}ok{% endif %}">
        {{ message }}
      </div>
    {% endfor %}

    <form method="POST" id="cpForm" novalidate>
      {% csrf_token %}

      <div class="form-group">
        <label>Current Password</label>
        <input type="password" name="current_password" id="currentPwd" placeholder="Enter current password" autocomplete="current-password">
        <div class="field-msg" id="currentMsg"></div>
      </div>

      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" id="newPwd" placeholder="Enter new password" autocomplete="new-password">
        <div class="field-msg" id="newMsg"></div>
      </div>

      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" id="confirmPwd" placeholder="Re-enter new password" autocomplete="new-password">
        <div class="field-msg" id="confirmMsg"></div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-change">Change Password</button>
        <a href="{% url 'user_dashboard' %}" class="btn btn-cancel">Cancel</a>
      </div>
    </form>

  </div>
</div>

<footer class="cp-footer">
  <p>© 2026 SweetCrave &nbsp;·&nbsp; <a href="/contact">Contact Us</a></p>
</footer>

<script>
  let submitted = false;

  function getMissingRules(val) {
    const missing = [];
    if (val.length < 8)          missing.push('at least 8 characters');
    if (!/[A-Z]/.test(val))      missing.push('uppercase letter');
    if (!/[a-z]/.test(val))      missing.push('lowercase letter');
    if (!/[0-9]/.test(val))      missing.push('number');
    if (!/[!@#$%^&*]/.test(val)) missing.push('special character (!@#$%^&*)');
    return missing;
  }

  document.getElementById('newPwd').addEventListener('input', function () {
    if (!submitted) return;
    const val = this.value;
    const missing = getMissingRules(val);
    if (!val) showErr('newMsg', 'newPwd', 'New password is required.');
    else if (missing.length) showErr('newMsg', 'newPwd', 'Password must include: ' + missing.join(', ') + '.');
    else clearErr('newMsg', 'newPwd');
    const confirm = document.getElementById('confirmPwd').value;
    if (confirm) {
      if (confirm === val) clearErr('confirmMsg', 'confirmPwd');
      else showErr('confirmMsg', 'confirmPwd', 'Passwords do not match.');
    }
  });

  document.getElementById('confirmPwd').addEventListener('input', function () {
    if (!submitted) return;
    const val = this.value;
    const newVal = document.getElementById('newPwd').value;
    if (!val) showErr('confirmMsg', 'confirmPwd', 'Please confirm your new password.');
    else if (val !== newVal) showErr('confirmMsg', 'confirmPwd', 'Passwords do not match.');
    else clearErr('confirmMsg', 'confirmPwd');
  });

  document.getElementById('currentPwd').addEventListener('input', function () {
    if (!submitted) return;
    if (this.value.trim()) clearErr('currentMsg', 'currentPwd');
    else showErr('currentMsg', 'currentPwd', 'Current password is required.');
  });

  document.getElementById('cpForm').addEventListener('submit', function (e) {
    submitted = true;
    ['currentMsg', 'newMsg', 'confirmMsg'].forEach(id => {
      const el = document.getElementById(id);
      el.textContent = '';
      el.classList.remove('show');
    });
    ['currentPwd', 'newPwd', 'confirmPwd'].forEach(id => {
      document.getElementById(id).classList.remove('is-error');
    });

    const current = document.getElementById('currentPwd').value.trim();
    const newVal  = document.getElementById('newPwd').value;
    const confirm = document.getElementById('confirmPwd').value;
    let valid = true;

    if (!current) { showErr('currentMsg', 'currentPwd', 'Current password is required.'); valid = false; }

    if (!newVal) { showErr('newMsg', 'newPwd', 'New password is required.'); valid = false; }
    else {
      const missing = getMissingRules(newVal);
      if (missing.length) { showErr('newMsg', 'newPwd', 'Password must include: ' + missing.join(', ') + '.'); valid = false; }
    }

    if (!confirm) { showErr('confirmMsg', 'confirmPwd', 'Please confirm your new password.'); valid = false; }
    else if (newVal !== confirm) { showErr('confirmMsg', 'confirmPwd', 'Passwords do not match.'); valid = false; }

    if (!valid) e.preventDefault();
  });

  function showErr(msgId, inputId, text) {
    const msg = document.getElementById(msgId);
    msg.textContent = text;
    msg.classList.add('show');
    document.getElementById(inputId).classList.add('is-error');
  }

  function clearErr(msgId, inputId) {
    const msg = document.getElementById(msgId);
    msg.textContent = '';
    msg.classList.remove('show');
    document.getElementById(inputId).classList.remove('is-error');
  }
</script>

{% endblock %}
