{% block content %}

<script>
  (function() {
    if (!document.querySelector('meta[name="viewport"]')) {
      var m = document.createElement('meta');
      m.name = 'viewport';
      m.content = 'width=device-width, initial-scale=1.0';
      document.head.appendChild(m);
    }
  })();
</script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }

body { background: #fffaf7; color: #1a1a1a; }

header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 48px; background: #ffffff;
  box-shadow: 0 2px 16px rgba(0,0,0,0.08); border-bottom: 1px solid #f0e8e0;
}
.logo { font-size: 26px; font-weight: 700; color: #1a1a1a; letter-spacing: 0.5px; text-decoration: none; }
.logo span { color: #d4845a; }

.page-wrapper { min-height: 100vh; display: flex; flex-direction: column; }

.main-content {
  flex: 1; padding: 100px 20px 60px;
  display: flex; align-items: center; justify-content: center;
}

.profile-container {
  max-width: 600px; width: 100%;
  background: #fff; border-radius: 20px; padding: 40px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.08); border: 1px solid #f0e8e0;
}

.profile-header {
  text-align: center; margin-bottom: 28px;
  padding-bottom: 22px; border-bottom: 1px solid #f0e8e0;
}
.profile-header h3 { font-size: 28px; font-weight: 700; color: #1a1a1a; }

.profile-pic-wrapper { text-align: center; margin-bottom: 28px; }
.profile-pic {
  width: 130px; height: 130px; border-radius: 50%;
  object-fit: cover; border: 4px solid #f0e8e0;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}

.profile-info { display: flex; flex-direction: column; gap: 14px; margin-bottom: 30px; }

.info-row {
  display: flex; align-items: flex-start;
  padding: 13px 16px; background: #fffaf7;
  border-radius: 12px; border: 1px solid #f0e8e0; gap: 12px;
}
.info-label { font-weight: 600; color: #666; font-size: 13px; min-width: 90px; padding-top: 1px; }
.info-value { color: #1a1a1a; flex: 1; font-size: 14px; word-break: break-word; }

.profile-actions { display: flex; gap: 12px; }

.btn {
  flex: 1; padding: 13px 24px; border-radius: 50px; border: none;
  font-size: 15px; font-weight: 600; cursor: pointer;
  text-decoration: none; text-align: center;
  transition: all 0.2s; touch-action: manipulation; display: inline-block;
}
.btn-edit { background: #d4845a; color: #fff; }
.btn-edit:hover { background: #bf6e44; transform: translateY(-1px); }
.btn-cancel { background: transparent; color: #1a1a1a; border: 1.5px solid #d0ccc8; }
.btn-cancel:hover { border-color: #1a1a1a; background: #f5f5f5; }

footer {
  background: #fff; border-top: 1px solid #f0e8e0;
  color: #999; text-align: center; padding: 20px 48px; font-size: 13px;
}

@media (max-width: 600px) {
  header { padding: 13px 18px; }
  .logo { font-size: 21px; }
  .main-content { padding: 84px 14px 40px; }
  .profile-container { padding: 28px 20px; border-radius: 16px; }
  .profile-header h3 { font-size: 22px; }
  .profile-header { margin-bottom: 20px; padding-bottom: 18px; }
  .profile-pic { width: 110px; height: 110px; }
  .info-label { min-width: 80px; font-size: 12px; }
  .info-value { font-size: 13px; }
  .profile-actions { flex-direction: column; gap: 10px; }
  .btn { font-size: 15px; padding: 14px; }
  footer { padding: 16px 14px; font-size: 12px; }
}
@media (max-width: 360px) {
  .profile-container { padding: 22px 14px; }
  .profile-header h3 { font-size: 20px; }
}
</style>

<div class="page-wrapper">

<header>
  <a href="/" class="logo">Sweet<span>Crave</span></a>
</header>

<div class="main-content">
  <div class="profile-container">

    <div class="profile-header">
      <h3>My Profile</h3>
    </div>

    {% if user.profile_pic %}
    <div class="profile-pic-wrapper">
      <img src="{{ user.profile_pic.url }}" alt="Profile Picture" class="profile-pic">
    </div>
    {% endif %}

    <div class="profile-info">
      <div class="info-row">
        <span class="info-label">Username</span>
        <span class="info-value">{{ user.username }}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Name</span>
        <span class="info-value">{{ user.name }}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Email</span>
        <span class="info-value">{{ user.email }}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Phone</span>
        <span class="info-value">{{ user.phone }}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Address</span>
        <span class="info-value">{{ user.address }}</span>
      </div>
    </div>

    <div class="profile-actions">
      <a href="{% url 'edit_profile' %}" class="btn btn-edit">Edit Profile</a>
      <a href="{% url 'user_dashboard' %}" class="btn btn-cancel">Back</a>
    </div>

  </div>
</div>

<footer>
  <p>© 2026 SweetCrave | All Rights Reserved</p>
</footer>
</div>

{% endblock %}
